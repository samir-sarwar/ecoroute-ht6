model = "Qwen/Qwen3.5-4B"
algorithm = "opd"
thinking = false

[environment]
id = "${FREESOLO_ENVIRONMENT_ID}"

[environment.params]
split = "train"

[train]
teacher_model = "glm-5.2"
epochs = 1
max_examples = 1000
group_size = 1
temperature = 0.7
max_completion_tokens = 512
max_context_tokens = 4096
lora_rank = 32
lora_alpha = 64
init_from_adapter = "${SUPPORT_SFT_RUN_ID}"
structured_outputs = "json_object"
