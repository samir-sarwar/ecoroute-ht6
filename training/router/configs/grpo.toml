model = "Qwen/Qwen3.5-2B"
algorithm = "grpo"
thinking = false

[environment]
id = "${FREESOLO_ENVIRONMENT_ID}"

[environment.params]
split = "train"

[train]
epochs = 2
max_examples = 1500
group_size = 4
temperature = 0.7
max_completion_tokens = 256
max_context_tokens = 4096
lora_rank = 32
lora_alpha = 64
init_from_adapter = "${ROUTER_SFT_RUN_ID}"
structured_outputs = "json_object"
